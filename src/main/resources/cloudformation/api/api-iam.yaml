#@ load("@ytt:data", "data")
#@ load("@ytt:assert", "assert")
---
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: FormKiQ IAM API
    
Parameters:
              
  AppEnvironment:
    Type: String
    AllowedPattern: ".+"
    Description: The FormKiQ Environment

  DocumentsApiRequestsArn:
    Description: Lambda to invoke
    Type: String

  OcrApiRequestsArn:
    Description: Lambda to invoke for Object examine endpoints
    Type: String

  CertificateStackNameIamApiDomain:
    Type: String
    Description: Certificate IAM Api Domain

Conditions:

  HasCertificateStackNameIamApiDomain:
    Fn::Not:
      - Fn::Or:
          - Fn::Equals:
              - Ref: CertificateStackNameIamApiDomain
              - ""
          - Fn::Equals:
              - Ref: CertificateStackNameIamApiDomain
              - "_"

Resources:

  DocumentsIamApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      FailOnWarnings: "true"

Outputs:
  DocumentsIamApi:
    Description: IAM API
    Value:
      Ref: DocumentsIamApi
  DocumentsIamApiUrl:
    Description: "The endpoint url for the IAM API"
    Value:
      Fn::If:
        - HasCertificateStackNameIamApiDomain
        - Fn::Join:
            - ''
            - - 'https://'
              - Ref: CertificateStackNameIamApiDomain
        - Fn::Sub: "https://${DocumentsIamApi}.execute-api.${AWS::Region}.amazonaws.com"
