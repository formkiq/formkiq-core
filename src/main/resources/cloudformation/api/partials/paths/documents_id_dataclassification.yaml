#@ load("@ytt:overlay", "overlay")
#@overlay/match by=overlay.all
---
paths:
  #@overlay/match missing_ok=True
  /documents/{documentId}/dataClassification:
    get:
      operationId: GetDocumentDataClassification
      summary: Get document's data classification
      description: Retrieve an document's data classification; available as an Add-On Module
      tags:
        - Intelligent Document Processing
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/documentIdParam'
        - $ref: '#/components/parameters/artifactIdParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/nextParam'
      responses:
        '200':
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDocumentDataClassificationResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/dataClassificationLambdaApi200"
    put:
      operationId: SetDocumentDataClassification
      summary: Set document's data classification
      description: Generate Data Classfication attributes within a document; available as an Add-On Module
      tags:
        - Intelligent Document Processing
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/documentIdParam'
        - $ref: '#/components/parameters/artifactIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetDocumentDataClassificationRequest'
      responses:
        '200':
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetDocumentDataClassificationResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/dataClassificationLambdaApi200"

  #@overlay/match missing_ok=True
  /documents/{documentId}/metadataExtractionResults:
    get:
      operationId: GetAllDocumentMetadataExtractionResults
      summary: Get all document's metadata extraction results
      description: Retrieve all document's metadata extraction; available as an Add-On Module
      tags:
      - Intelligent Document Processing
      parameters:
      - $ref: '#/components/parameters/siteIdParam'
      - $ref: '#/components/parameters/documentIdParam'
      - $ref: '#/components/parameters/artifactIdParam'
      - $ref: '#/components/parameters/limitParam'
      - $ref: '#/components/parameters/nextParam'
      responses:
        "200":
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDocumentMetadataExtractionResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/dataClassificationLambdaApi200'

  #@overlay/match missing_ok=True
  /documents/{documentId}/metadataExtractionResults/{llmPromptEntityName}:
    get:
      operationId: GetDocumentMetadataExtractionResults
      summary: Get document's metadata extraction results
      description: Retrieve an document's metadata extraction; available as an Add-On Module
      tags:
      - Intelligent Document Processing
      parameters:
      - $ref: '#/components/parameters/siteIdParam'
      - $ref: '#/components/parameters/documentIdParam'
      - $ref: '#/components/parameters/artifactIdParam'
      - $ref: '#/components/parameters/llmPromptEntityNameParam'
      - $ref: '#/components/parameters/limitParam'
      - $ref: '#/components/parameters/nextParam'
      responses:
        "200":
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDocumentMetadataExtractionResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/dataClassificationLambdaApi200'
    post:
      operationId: AddDocumentMetadataExtractionResult
      summary: Add document's metadata extraction result
      description: Create a document Metadatq Extraction Result attributes within a document; available as an Add-On Module
      tags:
      - Intelligent Document Processing
      parameters:
      - $ref: '#/components/parameters/siteIdParam'
      - $ref: '#/components/parameters/documentIdParam'
      - $ref: '#/components/parameters/artifactIdParam'
      - $ref: '#/components/parameters/llmPromptEntityNameParam'
      responses:
        "200":
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddDocumentMetadataExtractionResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/dataClassificationLambdaApi200'

components:
  schemas:
    #@overlay/match missing_ok=True
    GetDocumentDataClassificationResponse:
      type: "object"
      properties:
        next:
          type: "string"
          description: "Next page of results token"
        dataClassifications:
          type: "array"
          description: "List of Data Classifications"
          items:
            $ref: "#/components/schemas/DataClassification"

    #@overlay/match missing_ok=True
    DataClassification:
      type: "object"
      properties:
        llmPromptEntityName:
          type: "string"
          description: "Name of the LLM Prompt Entity"
        insertedDate:
          type: "string"
          description: "Inserted Timestamp"
        content:
          type: "string"
          description: "Result content"
        userId:
          type: "string"
          description: "UserId that created Result"
        attributes:
          description: "Attributes extracted from result content"
          type: "array"
          items:
            $ref: "#/components/schemas/DataClassificationAttribute"

    #@overlay/match missing_ok=True
    DataClassificationAttribute:
      type: "object"
      properties:
        key:
          type: "string"
          description: "Data Classification Attribute Key"
        value:
          type: "string"
          description: "Data Classification Attribute Value"

    #@overlay/match missing_ok=True
    MetadataExtractionAttribute:
      type: object
      properties:
        key:
          type: string
          description: Data Classification Attribute Key
        value:
          type: string
          description: Data Classification Attribute Value

    #@overlay/match missing_ok=True
    MetadataExtraction:
      type: object
      properties:
        llmPromptEntityName:
          type: string
          description: Name of the LLM Prompt Entity
        insertedDate:
          type: string
          description: Inserted Timestamp
        content:
          type: string
          description: Result content
        userId:
          type: string
          description: UserId that created Result
        attributes:
          description: Attributes extracted from result content
          type: array
          items:
            $ref: '#/components/schemas/MetadataExtractionAttribute'

    #@overlay/match missing_ok=True
    GetDocumentMetadataExtractionResponse:
      type: object
      properties:
        next:
          type: string
          description: Next page of results token
        metadataExtractions:
          type: array
          description: List of Metadata Extractions
          items:
            $ref: '#/components/schemas/MetadataExtraction'

    #@overlay/match missing_ok=True
    AddDocumentMetadataExtractionResponse:
      type: object
      properties:
        content:
          type: string
          description: Result content
        attributes:
          description: Attributes extracted from result content
          type: array
          items:
            $ref: '#/components/schemas/DataClassificationAttribute'