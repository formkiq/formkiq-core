#@ load("@ytt:overlay", "overlay")
#@overlay/match by=overlay.all
---
paths:
  #@overlay/match missing_ok=True
  /documents/{documentId}/artifacts:
    get:
      operationId: GetDocumentArtifacts
      summary: Get document artifacts
      description: Returns the list of artifact documents associated with the specified document
      tags:
        - Documents
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/documentIdParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/nextParam'
      responses:
        '200':
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDocumentsResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
  #@overlay/match missing_ok=True
  /documents/{documentId}/artifacts/promoteArtifact:
    put:
      operationId: PromoteDocumentArtifact
      summary: Promote document artifact
      description: Promotes a document artifact to the specified document
      tags:
        - Documents
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/documentIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteDocumentArtifactRequest'
        required: true
      responses:
        '200':
          $ref: '#/components/responses/200CorsSetResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"

components:
  schemas:
    #@overlay/match missing_ok=True
    PromoteDocumentArtifactRequest:
      type: object
      properties:
        artifactId:
          type: string
          description: Artifact Document Identifier. Omit to clear the promoted artifact.
