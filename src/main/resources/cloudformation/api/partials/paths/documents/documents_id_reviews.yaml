#@ load("@ytt:overlay", "overlay")
#@overlay/match by=overlay.all
---
paths:
  #@overlay/match missing_ok=True
  /documents/{documentId}/reviews:
    get:
      operationId: GetDocumentReviews
      summary: Get document reviews
      description: Get a listing of reviews for a document
      tags:
        - Document Reviews
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/documentIdParam'
        - $ref: '#/components/parameters/artifactIdParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/nextParam'
      responses:
        '200':
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDocumentReviewsResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    post:
      operationId: AddDocumentReview
      summary: Add document review
      description: Add a review to a document
      tags:
        - Document Reviews
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/documentIdParam'
        - $ref: '#/components/parameters/artifactIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDocumentReviewRequest'
      responses:
        '201':
          description: 201 CREATED
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddDocumentReviewResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi201"

  #@overlay/match missing_ok=True
  /documents/{documentId}/reviews/{reviewId}:
    get:
      operationId: GetDocumentReview
      summary: Get document review
      description: Get a document review by review id
      tags:
        - Document Reviews
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/documentIdParam'
        - $ref: '#/components/parameters/artifactIdParam'
        - $ref: '#/components/parameters/reviewIdParam'
      responses:
        '200':
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDocumentReviewResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    patch:
      operationId: UpdateDocumentReview
      summary: Update document review
      description: Update a document review by review id
      tags:
        - Document Reviews
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/documentIdParam'
        - $ref: '#/components/parameters/artifactIdParam'
        - $ref: '#/components/parameters/reviewIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentReviewRequest'
      responses:
        '200':
          $ref: '#/components/responses/200CorsUpdateResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"

components:
  parameters:
    #@overlay/match missing_ok=True
    reviewIdParam:
      name: reviewId
      in: path
      description: Review Identifier
      required: true
      schema:
        type: string

  schemas:
    #@overlay/match missing_ok=True
    DocumentReviewStatus:
      type: string
      description: |-
        Status of Document Review:
        - PENDING: Review has been created and is waiting for one or more decisions.
        - IN_PROGRESS: Review has been claimed or at least one decision has been submitted, but completion requirements are not yet satisfied.
        - COMPLETED: Completion requirements are satisfied.
        - CANCELLED: Review was cancelled before completion.
        - SUPERSEDED: Review was replaced by another review, usually because the artifact/document changed.
      enum:
        - PENDING
        - IN_PROGRESS
        - COMPLETED
        - CANCELLED
        - SUPERSEDED

    #@overlay/match missing_ok=True
    AddDocumentReviewRequest:
      type: object
      properties:
        review:
          $ref: "#/components/schemas/AddDocumentReview"

    #@overlay/match missing_ok=True
    AddDocumentReviewResponse:
      type: object
      required:
        - reviewId
      properties:
        reviewId:
          type: string
          description: Review Identifier

    #@overlay/match missing_ok=True
    AddDocumentReview:
      type: object
      required:
        - reviewCategory
        - requiredDecisions
      properties:
        reviewCategory:
          type: string
          description: Review category
        reviewStatus:
          $ref: "#/components/schemas/DocumentReviewStatus"
        requiredDecisions:
          type: integer
          format: int64
          minimum: 1
          description: Number of decisions required to complete the review
        comments:
          type: string
          description: Review comments

    #@overlay/match missing_ok=True
    UpdateDocumentReviewRequest:
      type: object
      properties:
        review:
          $ref: "#/components/schemas/UpdateDocumentReview"

    #@overlay/match missing_ok=True
    UpdateDocumentReview:
      type: object
      properties:
        reviewStatus:
          $ref: "#/components/schemas/DocumentReviewStatus"
        requiredDecisions:
          type: integer
          format: int64
          minimum: 1
          description: Number of decisions required to complete the review
        comments:
          type: string
          description: Review comments

    #@overlay/match missing_ok=True
    GetDocumentReviewsResponse:
      type: object
      properties:
        next:
          type: string
          description: Next page of results token
        reviews:
          type: array
          description: List of document reviews
          items:
            $ref: "#/components/schemas/DocumentReview"

    #@overlay/match missing_ok=True
    GetDocumentReviewResponse:
      type: object
      properties:
        review:
          $ref: "#/components/schemas/DocumentReview"

    #@overlay/match missing_ok=True
    DocumentReview:
      type: object
      properties:
        documentId:
          type: string
          description: Document Identifier
        artifactId:
          type: string
          description: Artifact Identifier
        reviewId:
          type: string
          description: Review Identifier
        reviewCategory:
          type: string
          description: Review category
        reviewStatus:
          $ref: "#/components/schemas/DocumentReviewStatus"
        requiredDecisions:
          type: integer
          format: int64
          description: Number of decisions required to complete the review
        userId:
          type: string
          description: User who added review
        comments:
          type: string
          description: Review comments
        insertedDate:
          type: string
          description: Inserted Timestamp
        lastModifiedDate:
          type: string
          description: Last Modified Timestamp
