#@ load("@ytt:overlay", "overlay")
#@overlay/match by=overlay.all
---
paths:
  #@overlay/match missing_ok=True
  /entityTypes:
    get:
      operationId: GetEntityTypes
      tags:
        - Entity
      description: Returns a list of entity types
      summary: Get EntityTypes
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/namespaceParam'
        - $ref: '#/components/parameters/nextParam'
        - $ref: '#/components/parameters/limitParam'
      responses:
        '200':
          description: "200 OK"
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetEntityTypesResponse"
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    post:
      operationId: AddEntityType
      description: |-
        Creates a Entity Type
      summary: Add New EntityType
      tags:
        - Entity
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddEntityTypeRequest'
      responses:
        '201':
          description: 201 CREATED
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddEntityTypeResponse'
        '400':
          description: 400 OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi201"

  #@overlay/match missing_ok=True
  /entityTypes/{entityTypeId}:
    get:
      operationId: GetEntityType
      tags:
        - Entity
      description: Returns a entity type
      summary: Get EntityType
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/entityTypeIdParam'
        - $ref: '#/components/parameters/namespaceParam'
      responses:
        '200':
          description: "200 OK"
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetEntityTypeResponse"
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    delete:
      operationId: DeleteEntityType
      description: Deletes Entity Type
      summary: Deletes Entity Type
      tags:
        - Entity
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/entityTypeIdParam'
      responses:
        '200':
          $ref: '#/components/responses/200CorsDeleteResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"

  #@overlay/match missing_ok=True
  /entities/{entityTypeId}:
    get:
      operationId: GetEntities
      tags:
        - Entity
      description: Returns a list of entities
      summary: Get Entities
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/entityTypeIdParam'
        - $ref: '#/components/parameters/namespaceParam'
        - $ref: '#/components/parameters/nextParam'
        - $ref: '#/components/parameters/limitParam'
      responses:
        '200':
          description: "200 OK"
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetEntitiesResponse"
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    post:
      operationId: AddEntity
      description: |-
        Creates a Entity
      summary: Add New Entity
      tags:
        - Entity
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/entityTypeIdParam'
        - $ref: '#/components/parameters/namespaceParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddEntityRequest'
      responses:
        '201':
          description: 201 CREATED
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddEntityResponse'
        '400':
          description: 400 OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi201"

  #@overlay/match missing_ok=True
  /entities/{entityTypeId}/{entityId}:
    get:
      operationId: GetEntity
      tags:
        - Entity
      description: Returns a entity
      summary: Get Entity
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/entityTypeIdParam'
        - $ref: '#/components/parameters/entityIdParam'
        - $ref: '#/components/parameters/namespaceParam'
      responses:
        '200':
          description: "200 OK"
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetEntityResponse"
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    patch:
      operationId: UpdateEntity
      description: |-
        Updates a Entity
      summary: Update Entity
      tags:
        - Entity
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/entityTypeIdParam'
        - $ref: '#/components/parameters/entityIdParam'
        - $ref: '#/components/parameters/namespaceParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntityRequest'
      responses:
        '200':
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateResponse'
        '400':
          description: 400 OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    delete:
      operationId: DeleteEntity
      description: Deletes Entity
      summary: Deletes Entity
      tags:
        - Entity
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/entityTypeIdParam'
        - $ref: '#/components/parameters/entityIdParam'
      responses:
        '200':
          $ref: '#/components/responses/200CorsDeleteResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"

  #@overlay/match missing_ok=True
  /entities/{entityTypeId}/{entityId}/attributes/{attributeKey}:
    delete:
      operationId: DeleteEntityAttribute
      description: Deletes Entity Attribute
      summary: Deletes Entity Attribute
      tags:
      - Entity
      parameters:
      - $ref: '#/components/parameters/siteIdParam'
      - $ref: '#/components/parameters/entityTypeIdParam'
      - $ref: '#/components/parameters/entityIdParam'
      - $ref: '#/components/parameters/attributeKeyParam'
      responses:
        "200":
          $ref: '#/components/responses/200CorsDeleteResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/lambdaApi200'

components:
  schemas:
    #@overlay/match missing_ok=True
    AddEntityResponse:
      type: "object"
      properties:
        entityId:
          type: "string"
          description: "Entity Identifier"

    #@overlay/match missing_ok=True
    AddEntityTypeResponse:
      type: "object"
      properties:
        entityTypeId:
          type: "string"
          description: "Entity Type Identifier"

    #@overlay/match missing_ok=True
    GetEntitiesResponse:
      type: "object"
      properties:
        next:
          type: "string"
          description: "Next page of results token"
        entities:
          type: "array"
          description: "List of Entities"
          items:
            $ref: "#/components/schemas/Entity"

    #@overlay/match missing_ok=True
    GetEntityResponse:
      type: "object"
      properties:
        entity:
          $ref: "#/components/schemas/Entity"

    #@overlay/match missing_ok=True
    GetEntityTypeResponse:
      type: "object"
      properties:
        entityType:
          $ref: "#/components/schemas/EntityType"

    #@overlay/match missing_ok=True
    Entity:
      type: "object"
      properties:
        entityId:
          type: "string"
          description: "Entity identifier"
        entityTypeId:
          type: "string"
          description: "Entity Type identifier"
        name:
          type: "string"
          description: "Entity Name"
        insertedDate:
          type: "string"
          description: "Inserted Timestamp"
        attributes:
          type: "array"
          description: "List of Entity Attributes"
          items:
            $ref: "#/components/schemas/EntityAttribute"

    #@overlay/match missing_ok=True
    AddEntityRequest:
      type: "object"
      properties:
        entity:
          $ref: "#/components/schemas/AddEntity"

    #@overlay/match missing_ok=True
    UpdateEntityRequest:
      type: "object"
      properties:
        entity:
          $ref: "#/components/schemas/AddEntity"

    #@overlay/match missing_ok=True
    AddEntity:
      type: "object"
      properties:
        name:
          type: "string"
          description: "Entity Name"
        attributes:
          type: "array"
          description: "List of Entity Attributes"
          items:
            $ref: "#/components/schemas/AddEntityAttribute"

    #@overlay/match missing_ok=True
    AddEntityAttribute:
      type: "object"
      properties:
        key:
          type: "string"
          description: "Attribute key"
        stringValue:
          type: "string"
          description: "Attribute with string value"
        stringValues:
          type: "array"
          description: "Attribute with string values"
          items:
            type: "string"
        numberValue:
          type: "number"
          description: "Attribute with number value"
        numberValues:
          type: "array"
          description: "Attribute with number values"
          items:
            type: "number"
        booleanValue:
          type: "boolean"
          description: "Attribute with boolean value"

    #@overlay/match missing_ok=True
    EntityAttribute:
      type: "object"
      properties:
        key:
          type: "string"
          description: "Attribute key"
        stringValue:
          type: "string"
          description: "Attribute with string value"
        stringValues:
          type: "array"
          description: "Attribute with string values"
          items:
            type: "string"
        numberValue:
          type: "number"
          description: "Attribute with number value"
        numberValues:
          type: "array"
          description: "Attribute with number values"
          items:
            type: "number"
        booleanValue:
          type: "boolean"
          description: "Attribute with boolean value"
        valueType:
          $ref: "#/components/schemas/AttributeValueType"

    #@overlay/match missing_ok=True
    GetEntityTypesResponse:
      type: "object"
      properties:
        next:
          type: "string"
          description: "Next page of results token"
        entityTypes:
          type: "array"
          description: "List of Entity Types"
          items:
            $ref: "#/components/schemas/EntityType"

    #@overlay/match missing_ok=True
    EntityType:
      type: "object"
      properties:
        entityTypeId:
          type: "string"
          description: "Entity Type identifier"
        namespace:
          $ref: "#/components/schemas/EntityTypeNamespace"
        name:
          type: "string"
          description: "Entity Type Name"
        insertedDate:
          type: "string"
          description: "Inserted Timestamp"

    #@overlay/match missing_ok=True
    AddEntityTypeRequest:
      type: "object"
      properties:
        entityType:
          $ref: "#/components/schemas/AddEntityType"

    #@overlay/match missing_ok=True
    AddEntityType:
      type: "object"
      properties:
        namespace:
          $ref: "#/components/schemas/EntityTypeNamespace"
        name:
          type: "string"
          description: "Entity Type Name"

    #@overlay/match missing_ok=True
    EntityTypeNamespace:
      type: string
      description: Entity Type namespace
      enum:
        - PRESET
        - CUSTOM