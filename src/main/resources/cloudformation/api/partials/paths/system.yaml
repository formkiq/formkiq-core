#@ load("@ytt:overlay", "overlay")
#@overlay/match by=overlay.all
---
paths:
  #@overlay/match missing_ok=True
  /system/configuration:
    get:
      operationId: GetSystemConfiguration
      description: Returns the system configuration
      summary: Get system configuration
      tags:
        - System Management
      responses:
        '200':
          description: "200 OK"
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetSystemConfigurationResponse"
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    patch:
      operationId: UpdateSystemConfiguration
      description: Update the system configuration
      summary: Update system configuration
      tags:
        - System Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSystemConfigurationRequest'
      responses:
        '200':
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateResponse'
        '400':
          description: 400 OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"

  #@overlay/match missing_ok=True
  /system/inferenceModels:
    get:
      operationId: GetSystemInferenceModels
      description: Returns the system inference models
      summary: Get system inference models
      tags:
        - System Management
      responses:
        '200':
          description: "200 OK"
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetSystemInferenceModelsResponse"
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/dataClassificationLambdaApi200"

components:
  schemas:
    #@overlay/match missing_ok=True
    SystemConfigurationWebUi:
      type: object
      required:
        - ssoLoginRedirectEnabled
      properties:
        ssoAutomaticSignIn:
          type: boolean
          description: "Enable SSO automatic sign in"

    #@overlay/match missing_ok=True
    GetSystemConfigurationResponse:
      type: object
      properties:
        webui:
          $ref: "#/components/schemas/SystemConfigurationWebUi"

    #@overlay/match missing_ok=True
    UpdateSystemConfigurationRequest:
      type: object
      properties:
        webui:
          $ref: "#/components/schemas/SystemConfigurationWebUi"

    #@overlay/match missing_ok=True
    GetSystemInferenceModelsResponse:
      type: object
      properties:
        inferenceModels:
          type: array
          description: "List of system inference models"
          items:
            $ref: "#/components/schemas/SystemInferenceModel"

    #@overlay/match missing_ok=True
    SystemInferenceModel:
      type: object
      properties:
        name:
          type: string
          example: "Amazon Nova 2 Lite"
        defaultModelId:
          type: string
          example: "amazon.nova-2-lite-v1:0"
        agreementAvailability:
          type: string
          example: "AVAILABLE"
        authorizationStatus:
          type: string
          example: "AUTHORIZED"
        entitlementAvailability:
          type: string
          example: "AVAILABLE"
        regionAvailability:
          type: string
          example: "AVAILABLE"
        modelInvocations:
          type: array
          items:
            $ref: "#/components/schemas/SystemInferenceModelInvocation"

    #@overlay/match missing_ok=True
    SystemInferenceModelInvocation:
      type: object
      required:
        - modelId
        - invocationType
      properties:
        modelId:
          type: string
          example: "amazon.nova-2-lite-v1:0"
        invocationType:
          type: string
          example: "DIRECT"
        inferenceProfileType:
          type: string
          example: "GEO"
        geo:
          type: string
          example: "US"
