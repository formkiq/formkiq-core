components:
  schemas:
    #@overlay/match missing_ok=True
    AddCaseResponse:
      type: "object"
      properties:
        caseId:
          type: "string"
          description: "Case Identifier"
    #@overlay/match missing_ok=True
    AddTaskResponse:
      type: "object"
      properties:
        taskId:
          type: "string"
          description: "Task Identifier"
    #@overlay/match missing_ok=True
    AddNigoResponse:
      type: "object"
      properties:
        nigoId:
          type: "string"
          description: "Nigo Identifier"
    #@overlay/match missing_ok=True
    AddCaseRequest:
      required:
        - "case"
      type: "object"
      properties:
        case:
          $ref: "#/components/schemas/AddCase"
    #@overlay/match missing_ok=True
    AddCase:
      required:
        - "name"
      type: "object"
      properties:
        name:
          type: "string"
          description: "Case Name"
        status:
          $ref: "#/components/schemas/CaseStatus"
        plannedStartDate:
          type: "string"
          description: "Planned Start Date"
        startDate:
          type: "string"
          description: "Start Date"
        endDate:
          type: "string"
          description: "End Date"
        dueDate:
          type: "string"
          description: "Due Date"
        description:
          type: "string"
          description: "Case Description"
        documentNumberFormat:
          type: "array"
          description: "Format of Document Number"
          items:
            $ref: "#/components/schemas/StringFormat"
        caseNumberFormat:
          type: "array"
          description: "Format of Case Number"
          items:
            $ref: "#/components/schemas/StringFormat"
        metadata:
          type: "object"
          additionalProperties:
            type: object
        documentIds:
          type: "array"
          items:
            type: "string"
    #@overlay/match missing_ok=True
    StringFormat:
      type: "object"
      properties:
        type:
          $ref: "#/components/schemas/StringGeneratorType"
        staticValue:
          type: "string"
          description: "Static Value"
        padding:
          type: "integer"
          description: "Optional padding for AUTO_INCREMENT number"
    #@overlay/match missing_ok=True
    UpdateCaseResponse:
      type: "object"
      properties:
        caseId:
          type: "string"
          description: "Case Identifier"
    #@overlay/match missing_ok=True
    UpdateCaseRequest:
      type: "object"
      properties:
        case:
          $ref: "#/components/schemas/UpdateCase"
    #@overlay/match missing_ok=True
    UpdateCase:
      type: "object"
      properties:
        name:
          type: "string"
          description: "Case Name"
        status:
          $ref: "#/components/schemas/CaseStatus"
        description:
          type: "string"
          description: "Case Description"
        metadata:
          type: "object"
          additionalProperties:
            type: object
