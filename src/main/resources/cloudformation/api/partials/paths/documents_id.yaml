#@ load("@ytt:overlay", "overlay")
#@overlay/match by=overlay.all
---
paths:
  #@overlay/match missing_ok=True
  /documents/{documentId}:
    get:
      operationId: GetDocument
      summary: Get document
      description: Retrieves a document's details, i.e., metadata
      tags:
        - Documents
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/documentIdParam'
        - $ref: '#/components/parameters/artifactIdParam'
        - $ref: '#/components/parameters/shareKeyParam'
      responses:
        '200':
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDocumentResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    patch:
      operationId: UpdateDocument
      summary: Update document
      description: |-
        Update a document's details, i.e., metadata
        
        If no content is specified, the endpoint will return a S3 Presigned that will allow for the uploading of Large document data. 

        NOTE:
        - provided attributes will overwrite existing matching attribute keys in the document. Attributes not included in the request body will remain unchanged.
      tags:
        - Documents
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/documentIdParam'
        - $ref: '#/components/parameters/artifactIdParam'
        - $ref: '#/components/parameters/shareKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentRequest'
            examples:
              Simple_File:
                value:
                  path: test.txt
                  contentType: text/plain
                  isBase64: false
                  content: This is sample data file
                  tags:
                    - key: category
                      value: sample
                    - key: players
                      values: ["111", "222"]
                  metadata:
                    - key: info
                      value: Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
      responses:
        '200':
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddDocumentResponse'
        '400':
          description: 400 OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    delete:
      operationId: DeleteDocument
      summary: Delete document
      description: |-
        Delete a document's details, i.e., metadata, contents, etc

        SoftDelete:

        The SoftDelete parameter allows for the temporary removal of a document's metadata, attributes, etc from being retrieved from all API requests.

        The document can be permanently deleted by calling the DELETE /documents/{documentId} with softDelete=false or restored using the PUT /documents/{documentId}/restore.

        Only the GET /documents?softDeleted=true will return all the soft deleted documents.
      tags:
        - Documents
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/documentIdParam'
        - $ref: '#/components/parameters/artifactIdParam'
        - name: "softDelete"
          in: "query"
          description: "Whether to soft delete document"
          schema:
            type: "boolean"
      responses:
        '200':
          $ref: '#/components/responses/200CorsDeleteResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"

components:
  schemas:
    #@overlay/match missing_ok=True
    GetDocumentResponse:
      required:
        - "documentId"
      type: "object"
      properties:
        artifactId:
          type: "string"
          description: "Artifact Identifier"
        siteId:
          type: "string"
          description: "Site Identifier"
        path:
          type: "string"
          description: "Path or Name of document"
        width:
          type: "string"
          description: "Document Content Width property"
        height:
          type: "string"
          description: "Document Content Height property"
        deepLinkPath:
          type: "string"
          description: "Path or Name of deep link"
        insertedDate:
          type: "string"
          description: "Inserted Timestamp"
        lastModifiedDate:
          type: "string"
          description: "Last Modified Timestamp"
        checksum:
          type: "string"
          description: "Document checksum, changes when document file changes"
        checksumType:
          $ref: "#/components/schemas/ChecksumType"
        documentId:
          type: "string"
          description: "Document Identifier"
        contentType:
          type: "string"
          description: "Document Content-Type"
        userId:
          type: "string"
          description: "User who added document"
        contentLength:
          type: "integer"
          description: "Document size"
        versionId:
          type: "string"
          description: "Document version"
        documents:
          type: "array"
          description: "List of child documents"
          items:
            $ref: "#/components/schemas/ChildDocument"
        belongsToDocumentId:
          type: "string"
          description: "Parent Document Identifier"
        metadata:
          type: "array"
          description: "List of document Metadata"
          items:
            $ref: "#/components/schemas/DocumentMetadata"

    #@overlay/match missing_ok=True
    ChildDocument:
      required:
        - "documentId"
      type: "object"
      properties:
        path:
          type: "string"
          description: "Path or Name of document"
        width:
          type: "string"
          description: "Document Content Width property"
        height:
          type: "string"
          description: "Document Content Height property"
        deepLinkPath:
          type: "string"
          description: "Path or Name of deep link"
        insertedDate:
          type: "string"
          description: "Inserted Timestamp"
        lastModifiedDate:
          type: "string"
          description: "Last Modified Timestamp"
        checksum:
          type: "string"
          description: "Document checksum, changes when document file changes"
        documentId:
          type: "string"
          description: "Document Identifier"
        contentType:
          type: "string"
          description: "Document Content-Type"
        userId:
          type: "string"
          description: "User who added document"
        contentLength:
          type: "integer"
          description: "Document size"
        versionId:
          type: "string"
          description: "Document version"
        belongsToDocumentId:
          type: "string"
          description: "Parent Document Identifier"

    #@overlay/match missing_ok=True
    UpdateDocumentRequest:
      type: "object"
      properties:
        path:
          type: "string"
          description: "Path or Name of document"
        width:
          type: "string"
          description: "Document Content Width property"
        height:
          type: "string"
          description: "Document Content Height property"
        deepLinkPath:
          type: "string"
          description: "Path or Name of deep link"
        contentType:
          type: "string"
          description: "Document media type"
        isBase64:
          type: "boolean"
          description: "Is the content Base64-encoded?"
        content:
          type: "string"
          description: "Document content"
        checksum:
          type: "string"
          description: "Document checksum, changes when document file changes"
        checksumType:
          $ref: "#/components/schemas/ChecksumType"
        tags:
          type: "array"
          description: "List of document tags"
          items:
            $ref: "#/components/schemas/AddDocumentTag"
        metadata:
          type: "array"
          description: "List of document Metadata"
          items:
            $ref: "#/components/schemas/AddDocumentMetadata"
        attributes:
          type: "array"
          description: "List of document attributes"
          items:
            $ref: "#/components/schemas/AddDocumentAttribute"
        actions:
          type: array
          description: "List of Actions"
          items:
            $ref: "#/components/schemas/AddAction"
        documents:
          type: "array"
          description: "List of child documents"
          items:
            $ref: "#/components/schemas/AddChildDocument"
