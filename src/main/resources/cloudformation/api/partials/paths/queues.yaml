#@ load("@ytt:overlay", "overlay")
#@overlay/match by=overlay.all
---
paths:
  #@overlay/match missing_ok=True
  /queues:
    get:
      operationId: GetQueues
      summary: Get queues
      description: Get a listing of queues; available as an Add-On Module
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/nextParam'
        - $ref: '#/components/parameters/limitParam'
      tags:
        - Document Workflows
      responses:
        '200':
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetQueuesResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    post:
      operationId: AddQueue
      summary: Add queue
      description: Creates a new Queue; available as an Add-On Module
      tags:
        - Document Workflows
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddQueueRequest'
      responses:
        '201':
          description: 201 CREATED
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddQueueResponse'
        '400':
          description: 400 BAD REQUEST
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorsResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi201"

  #@overlay/match missing_ok=True
  /queues/{queueId}:
    get:
      operationId: GetQueue
      summary: Get queue
      description: Get a queue; available as an Add-On Module
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/queueIdParam'
      tags:
        - Document Workflows
      responses:
        '200':
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetQueueResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    delete:
      operationId: DeleteQueue
      summary: Delete queue
      description: Delete a Queue; available as an Add-On Module
      tags:
        - Document Workflows
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/queueIdParam'
      responses:
        '200':
          description: "200 OK"
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/DeleteQueueResponse"
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"

  #@overlay/match missing_ok=True
  /queues/{queueId}/documents:
    get:
      operationId: GetWorkflowQueueDocuments
      summary: Get list of documents in queue
      description: List documents in Workflow Queue; available as an Add-On Module
      tags:
        - Document Workflows
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/queueIdParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/nextParam'
      responses:
        '200':
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWorkflowQueueDocumentsResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/searchLambdaApi200"

components:
  schemas:
    #@overlay/match missing_ok=True
    WorkflowDocument:
      type: "object"
      properties:
        workflow:
          $ref: "#/components/schemas/WorkflowSummary"
        document:
          $ref: "#/components/schemas/Document"


    #@overlay/match missing_ok=True
    DeleteQueueResponse:
      type: object
      properties:
        message:
          type: "string"
          description: "Result message"

    #@overlay/match missing_ok=True
    AddQueueRequest:
      type: "object"
      required:
        - name
      properties:
        name:
          description: "Queue name"
          type: "string"


    #@overlay/match missing_ok=True
    AddQueueResponse:
      type: "object"
      properties:
        queueId:
          type: "string"
          description: "Queue Identifier"


    #@overlay/match missing_ok=True
    GetQueuesResponse:
      type: "object"
      properties:
        next:
          type: "string"
          description: "Next page of results token"
        queues:
          type: "array"
          description: "List of queues"
          items:
            $ref: "#/components/schemas/Queue"

    #@overlay/match missing_ok=True
    Queue:
      type: "object"
      properties:
        name:
          type: "string"
          description: "Name of Queue"
        queueId:
          type: "string"
          description: "Queue identifier"

    #@overlay/match missing_ok=True
    GetQueueResponse:
      type: "object"
      properties:
        name:
          description: "Queue name"
          type: "string"

    #@overlay/match missing_ok=True
    GetWorkflowQueueDocumentsResponse:
      type: "object"
      properties:
        next:
          type: "string"
          description: "Next page of results token"
        documents:
          type: "array"
          description: "List of search result documents"
          items:
            $ref: "#/components/schemas/WorkflowDocument"
