#@ load("@ytt:overlay", "overlay")
#@overlay/match by=overlay.all
---
paths:
  #@overlay/match missing_ok=True
  /attributes:
    get:
      operationId: GetAttributes
      tags:
        - Attributes
      description: Returns a list of attributes
      summary: Get Attributes listing
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/nextParam'
        - $ref: '#/components/parameters/limitParam'
      responses:
        '200':
          description: "200 OK"
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetAttributesResponse"
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    post:
      operationId: AddAttribute
      description: |-
        Creates a new attribute
      summary: Add new attribute
      tags:
        - Attributes
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAttributeRequest'
      responses:
        '201':
          description: 201 CREATED
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddResponse'
        '400':
          description: 400 OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi201"

  #@overlay/match missing_ok=True
  /attributes/{key}:
    get:
      operationId: GetAttribute
      tags:
        - Attributes
      description: Returns a attribute
      summary: Get Attribute
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/keyParam'
      responses:
        '200':
          description: "200 OK"
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetAttributeResponse"
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    patch:
      operationId: UpdateAttribute
      description: |-
        Updates existing attribute
      summary: Update existing attribute
      tags:
        - Attributes
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/keyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAttributeRequest'
      responses:
        '200':
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateResponse'
        '400':
          description: 400 OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    delete:
      operationId: DeleteAttribute
      description: |-
        Delete a attribute
      summary: Delete attribute
      tags:
        - Attributes
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/keyParam'
      responses:
        '200':
          $ref: '#/components/responses/200CorsDeleteResponse'
        '400':
          description: 400 OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"

  #@overlay/match missing_ok=True
  /attributes/{key}/allowedValues:
    get:
      operationId: GetAttributeAllowedValues
      tags:
        - Attributes
      description: |-
        Returns an attribute's allowed values that spans across all classifications and site schema
      summary: Get Attribute Allowed Values
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/keyParam'
      responses:
        '200':
          description: "200 OK"
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetAttributeAllowedValuesResponse"
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"

components:
  schemas:
    #@overlay/match missing_ok=True
    GetAttributesResponse:
      type: "object"
      properties:
        next:
          type: "string"
          description: "Next page of results token"
        attributes:
          type: "array"
          description: "List of attributes"
          items:
            $ref: "#/components/schemas/Attribute"

    #@overlay/match missing_ok=True
    Attribute:
      type: "object"
      properties:
        type:
          $ref: "#/components/schemas/AttributeType"
        key:
          type: "string"
          description: "Attribute Key"
        dataType:
          $ref: "#/components/schemas/AttributeDataType"
        watermark:
          $ref: "#/components/schemas/Watermark"

    #@overlay/match missing_ok=True
    Watermark:
      type: "object"
      properties:
        fontSize:
          type: "number"
          description: "Watermark Font Size"
        text:
          type: "string"
          description: "Watermark text"
        rotation:
          type: "number"
          description: "Watermark Rotation"
        imageDocumentId:
          type: "string"
          description: "Watermark Image Document Id"
        scale:
          $ref: "#/components/schemas/WatermarkScale"
        position:
          $ref: "#/components/schemas/WatermarkPosition"

    #@overlay/match missing_ok=True
    WatermarkPosition:
      type: "object"
      properties:
        xAnchor:
          $ref: "#/components/schemas/WatermarkPositionXAnchor"
        yAnchor:
          $ref: "#/components/schemas/WatermarkPositionYAnchor"
        xOffset:
          type: "number"
          description: "X offset"
        yOffset:
          type: "number"
          description: "Y offset"

    #@overlay/match missing_ok=True
    WatermarkScale:
      type: string
      description: Watermark Scale
      enum:
        - FIT_BEST
        - ORIGINAL

    #@overlay/match missing_ok=True
    WatermarkPositionXAnchor:
      type: string
      description: Watermark X Position Anchor
      enum:
        - LEFT
        - RIGHT
        - CENTER

    #@overlay/match missing_ok=True
    WatermarkPositionYAnchor:
      type: string
      description: Watermark Y Position Anchor
      enum:
        - TOP
        - BOTTOM
        - CENTER

    #@overlay/match missing_ok=True
    AttributeType:
      type: string
      description: Type of Attribute
      default: STANDARD
      enum:
        - STANDARD
        - OPA
        - GOVERNANCE

    #@overlay/match missing_ok=True
    AttributeDataType:
      type: string
      description: Data Type of Attribute
      default: STRING
      enum:
        - STRING
        - NUMBER
        - BOOLEAN
        - KEY_ONLY
        - PUBLICATION
        - WATERMARK
        - ENTITY

    #@overlay/match missing_ok=True
    AddAttributeRequest:
      required:
        - "attribute"
      type: "object"
      properties:
        attribute:
          $ref: "#/components/schemas/AddAttribute"

    #@overlay/match missing_ok=True
    AddAttribute:
      required:
        - "key"
      type: "object"
      properties:
        key:
          type: "string"
          description: "Attribute Key"
        dataType:
          $ref: "#/components/schemas/AttributeDataType"
        type:
          $ref: "#/components/schemas/AttributeType"
        watermark:
          $ref: "#/components/schemas/Watermark"

    #@overlay/match missing_ok=True
    GetAttributeResponse:
      type: "object"
      properties:
        attribute:
          $ref: "#/components/schemas/Attribute"

    #@overlay/match missing_ok=True
    UpdateAttributeRequest:
      required:
        - "attribute"
      type: "object"
      properties:
        attribute:
          $ref: "#/components/schemas/UpdateAttribute"

    #@overlay/match missing_ok=True
    UpdateAttribute:
      type: "object"
      properties:
        type:
          $ref: "#/components/schemas/AttributeType"
        watermark:
          $ref: "#/components/schemas/Watermark"

    #@overlay/match missing_ok=True
    GetAttributeAllowedValuesResponse:
      type: "object"
      properties:
        allowedValues:
          type: "array"
          description: "Attribute's allowed values"
          items:
            type: "string"
        localizedAllowedValues:
          type: "object"
          additionalProperties:
            type: string

