components:
  schemas:
    #@overlay/match missing_ok=True
    AddSiteRequest:
      type: "object"
      properties:
        site:
          $ref: "#/components/schemas/AddSite"
    #@overlay/match missing_ok=True
    AddSite:
      type: "object"
      properties:
        id:
          description: "Site Id"
          type: "string"
        title:
          description: "Title of Site"
          type: "string"
        status:
          $ref: "#/components/schemas/SiteStatus"
    #@overlay/match missing_ok=True
    GetSitesResponse:
      type: object
      properties:
        username:
          type: string
          description: Username of request caller
        roles:
          type: array
          items:
            type: string
        samlGroups:
          type: array
          description: List of User Saml Groups
          items:
            type: string
        userClaims:
          type: object
          description: Map of custom JWT claims
          additionalProperties:
            type: object
        sites:
          type: array
          description: List of sites
          items:
            $ref: '#/components/schemas/Site'
    #@overlay/match missing_ok=True
    Site:
      type: "object"
      properties:
        siteId:
          type: "string"
          description: "Site Identifier"
        title:
          type: "string"
          description: "Site Title"
        status:
          $ref: "#/components/schemas/SiteStatus"
        permission:
          deprecated: true
          description: "Deprecated: use permissions"
          $ref: "#/components/schemas/SitePermission"
        roles:
          type: "array"
          description: List of roles used to get permissions
          items:
            type: "string"
        permissions:
          type: "array"
          items:
            $ref: "#/components/schemas/SiteGroupPermissions"
        uploadEmail:
          type: "string"
          description: "SiteId document upload email address"
        config:
          $ref: "#/components/schemas/SiteConfig"
        usage:
          $ref: "#/components/schemas/SiteUsage"
    #@overlay/match missing_ok=True
    SiteStatus:
      type: string
      description: "Site status"
      enum:
        - ACTIVE
        - INACTIVE
    #@overlay/match missing_ok=True
    SitePermission:
      type: string
      deprecated: true
      description: "Deprecated: use permissions"
      enum:
        - READ_WRITE
        - READ_ONLY
    #@overlay/match missing_ok=True
    SiteGroupPermissions:
      type: string
      description: "Site Group Permissions"
      enum:
        - ADMIN
        - DELETE
        - READ
        - WRITE
        - GOVERN
    #@overlay/match missing_ok=True
    SiteConfig:
      type: "object"
      properties:
        maxContentLengthBytes:
          type: "string"
          description: "Set Maximum Document Content Length in Bytes"
        maxDocuments:
          type: "string"
          description: "Set Maximum number of Documents allowed"
