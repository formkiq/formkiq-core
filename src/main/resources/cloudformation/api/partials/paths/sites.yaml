components:
  schemas:
    #@overlay/match missing_ok=True
    OpaPolicyAttributeEq:
      type: "object"
      description: "Attribute EQ criteria"
      properties:
        stringValue:
          type: "string"
          description: "The value to compare the Attribute Key value to"
        numberValue:
          type: "number"
          description: "The value to compare the Attribute Key value to"
        booleanValue:
          type: "boolean"
          description: "The value to compare the Attribute Key value to"
        input:
          $ref: "#/components/schemas/OpaPolicyAttributeInput"

    #@overlay/match missing_ok=True
    OpaPolicyAttributeGt:
      type: "object"
      description: "Attribute greater than criteria"
      properties:
        numberValue:
          type: "number"
          description: "The value to compare the Attribute Key value to"

    #@overlay/match missing_ok=True
    OpaPolicyAttributeGte:
      type: "object"
      description: "Attribute greater than and equals to criteria"
      properties:
        numberValue:
          type: "number"
          description: "The value to compare the Attribute Key value to"

    #@overlay/match missing_ok=True
    OpaPolicyAttributeLt:
      type: "object"
      description: "Attribute less than criteria"
      properties:
        numberValue:
          type: "number"
          description: "The value to compare the Attribute Key value to"

    #@overlay/match missing_ok=True
    OpaPolicyAttributeLte:
      type: "object"
      description: "Attribute less than and equals to criteria"
      properties:
        numberValue:
          type: "number"
          description: "The value to compare the Attribute Key value to"

    #@overlay/match missing_ok=True
    OpaPolicyAttributeNeq:
      type: "object"
      description: "Attribute not equal to criteria"
      properties:
        stringValue:
          type: "string"
          description: "The value to compare the Attribute Key value to"

    #@overlay/match missing_ok=True
    OpaPolicyAttributeIn:
      type: "object"
      description: "Attribute In to criteria"
      properties:
        stringValues:
          type: "array"
          items:
            type: "string"
          description: "The value to compare the Attribute Key value to"

    #@overlay/match missing_ok=True
    OpaPolicyAttributeNotIn:
      type: "object"
      description: "Attribute Not In to criteria"
      properties:
        stringValues:
          type: "array"
          items:
            type: "string"
          description: "The value to compare the Attribute Key value to"

    #@overlay/match missing_ok=True
    OpaPolicyAttributeInput:
      type: "object"
      properties:
        matchUsername:
          type: "boolean"
          description: "Match Input Username"
        matchUserClaim:
          type: "string"
          description: "Matches user claim name to match against the Attribute Key value"

    #@overlay/match missing_ok=True
    OpaPolicyInputMethod:
      type: "object"
      properties:
        in:
          type: "array"
          description: "List of HTTP Methods"
