#@ load("@ytt:overlay", "overlay")
#@overlay/match by=overlay.all
---
paths:
  #@overlay/match missing_ok=True
  /workflows:
    get:
      operationId: GetWorkflows
      summary: Get workflows
      description: Get a listing of workflows; available as an Add-On Module
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
        - $ref: '#/components/parameters/nextParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/statusParam'
      tags:
        - Document Workflows
      responses:
        '200':
          description: 200 OK
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWorkflowsResponse'
      security:
        - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"
    post:
      operationId: AddWorkflow
      summary: Add workflow
      description: Creates a new Workflow; available as an Add-On Module
      tags:
        - Document Workflows
      parameters:
        - $ref: '#/components/parameters/siteIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWorkflowRequest'
      responses:
        '201':
          description: 201 CREATED
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddWorkflowResponse'
        '400':
          description: 400 BAD REQUEST
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorsResponse'
      security:
        - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi201"

components:
  schemas:

    #@overlay/match missing_ok=True
    GetWorkflowsResponse:
      type: "object"
      properties:
        next:
          type: "string"
          description: "Next page of results token"
        workflows:
          type: "array"
          description: "List of workflows"
          items:
            $ref: "#/components/schemas/WorkflowSummary"

    #@overlay/match missing_ok=True
    WorkflowSummary:
      type: "object"
      properties:
        name:
          type: "string"
          description: "Name of Workflow"
        workflowId:
          type: "string"
          description: "Workflow identifier"
        description:
          type: "string"
          description: "Description of Workflow"
        insertedDate:
          type: "string"
          description: "Inserted Timestamp"
        userId:
          type: "string"
          description: "User who created workflow"
        inUse:
          type: "boolean"
          description: "Whether the Workflow is in use"
        status:
          $ref: "#/components/schemas/WorkflowStatus"

    #@overlay/match missing_ok=True
    WorkflowStatus:
      type: string
      description: Status of the Workflow
      enum:
        - ACTIVE
        - INACTIVE

    #@overlay/match missing_ok=True
    AddWorkflowRequest:
      type: "object"
      required:
        - name
        - status
        - steps
      properties:
        name:
          description: "Workflow name"
          type: "string"
        description:
          description: "Workflow description"
          type: "string"
        status:
          $ref: "#/components/schemas/WorkflowStatus"
        steps:
          type: "array"
          description: "Workflow Steps"
          items:
            $ref: "#/components/schemas/AddWorkflowStep"

    #@overlay/match missing_ok=True
    AddWorkflowStep:
      type: "object"
      properties:
        stepId:
          description: "Workflow Step Identifier"
          type: "string"
        action:
          $ref: "#/components/schemas/AddAction"
        queue:
          $ref: "#/components/schemas/AddWorkflowStepQueue"
        mappingIds:
          type: "array"
          items:
            type: "string"
        decisions:
          type: "array"
          description: "Workflow Decisions"
          items:
            $ref: "#/components/schemas/AddWorkflowStepDecision"

    #@overlay/match missing_ok=True
    AddWorkflowStepQueue:
      type: object
      required:
        - queueId
      properties:
        queueId:
          type: "string"
          description: "Queue Identifier"
        approvalGroups:
          items:
            type: "string"

    #@overlay/match missing_ok=True
    AddWorkflowStepDecision:
      required:
        - type
        - nextStepId
      type: object
      properties:
        type:
          $ref: "#/components/schemas/WorkflowStepDecisionType"
        nextStepId:
          type: "string"
          description: "Workflow Step to move to"

    #@overlay/match missing_ok=True
    WorkflowStepDecisionType:
      type: string
      description: Type of Workflow Step Decision
      enum:
        - APPROVE
        - REJECT

    #@overlay/match missing_ok=True
    AddWorkflowResponse:
      type: "object"
      properties:
        workflowId:
          type: "string"
          description: "Workflow Identifier"