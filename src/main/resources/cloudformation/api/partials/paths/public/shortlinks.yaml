#@ load("@ytt:overlay", "overlay")
#@overlay/match by=overlay.all
---
paths:
  #@overlay/match missing_ok=True
  /shortlinks:
    post:
      operationId: AddShortlink
      summary: Add shortlink
      description: Create a shortlink for a target URL
      tags:
        - Shortlinks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddShortlinkRequest'
      responses:
        '201':
          description: 201 CREATED
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddShortlinkResponse'
        '400':
          description: 400 OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi201"

components:
  schemas:
    #@overlay/match missing_ok=True
    AddShortlinkRequest:
      type: "object"
      required:
        - targetUrl
        - slug
      properties:
        targetUrl:
          type: "string"
          description: "Target URL for the shortlink"
        slug:
          type: "string"
          description: "Shortlink slug"
    #@overlay/match missing_ok=True
    AddShortlinkResponse:
      type: "object"
      properties:
        url:
          type: "string"
          description: "Shortlink URL"