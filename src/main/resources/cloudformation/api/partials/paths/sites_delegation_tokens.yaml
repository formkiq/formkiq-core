#@ load("@ytt:overlay", "overlay")
#@overlay/match by=overlay.all
---
paths:
  #@overlay/match missing_ok=True
  /sites/{siteId}/delegationTokens:
    post:
      operationId: GenerateDelegationToken
      description: |-
        Creates a KMS-signed delegation token for a site. This endpoint requires ADMIN permission
        for the requested siteId. The returned token is sent on later API requests in the
        x-formkiq-delegation-token header and reduces the caller's effective permissions to the
        requested subset for that site. It cannot grant ADMIN, add permissions the caller does not
        already have, or add access to other sites. When onBehalfOf is supplied, activity created
        while using the token is attributed to that username while the signed token still records
        the ADMIN principal that issued it. The reason is signed into the token for audit and
        support traceability.
      summary: Generate a delegation token
      tags:
        - System Management
      parameters:
        - $ref: '#/components/parameters/siteIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDelegationTokenRequest'
      responses:
        '200':
          description: "200 OK"
          headers:
            Access-Control-Allow-Origin:
              $ref: '#/components/headers/AccessControlAllowOrigin'
            Access-Control-Allow-Methods:
              $ref: '#/components/headers/AccessControlAllowMethods'
            Access-Control-Allow-Headers:
              $ref: '#/components/headers/AccessControlAllowHeaders'
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AddDelegationTokenResponse"
        '400':
          description: 400 Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
      security:
      - ApiAuthorization: []
      x-amazon-apigateway-integration:
        $ref: "#/components/x-amazon-apigateway-integrations/lambdaApi200"

components:
  #@overlay/match missing_ok=True
  schemas:
    #@overlay/match missing_ok=True
    AddDelegationTokenRequest:
      type: object
      required:
        - permissions
        - reason
      properties:
        permissions:
          type: array
          description: Permissions to keep while the delegation token is applied. These must be a subset of the caller's current permissions for the site and cannot include ADMIN.
          items:
            $ref: '#/components/schemas/DelegationTokenPermission'
        onBehalfOf:
          $ref: '#/components/schemas/DelegationTokenPrincipal'
        reason:
          type: string
          description: Reason the delegation token is being generated. Stored in the signed token for audit/support traceability.
          minLength: 1
          maxLength: 1024
    #@overlay/match missing_ok=True
    DelegationTokenPermission:
      type: string
      enum:
        - READ
        - WRITE
        - DELETE
        - GOVERN
    #@overlay/match missing_ok=True
    DelegationTokenPrincipal:
      type: object
      description: User identity to store in the signed delegation token.
      required:
        - username
      properties:
        username:
          type: string
          description: Username to use for activity/audit attribution when the delegation token is applied.
          minLength: 1
          maxLength: 256
    #@overlay/match missing_ok=True
    AddDelegationTokenResponse:
      type: object
      properties:
        headerName:
          type: string
          example: x-formkiq-delegation-token
        delegationToken:
          type: string
          description: Signed token to send in the x-formkiq-delegation-token request header.
        expires:
          type: integer
          format: int64
          description: Expiration epoch seconds. Omitted when the token does not expire.
