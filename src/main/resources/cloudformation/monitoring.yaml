AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: FormKiQ Monitoring

Parameters:

  AppEnvironment:
    Type: String
    Description: Unique Application Environment Identifier, IE dev/staging/prod
    AllowedPattern: ".+"

  DocumentsApiRequests:
    Type: String
    Description: Documents API Lambda Function Name

  DocumentsUpdateObject:
    Type: String
    Description: Documents Update Object Lambda Function Name

  StagingCreateObject:
    Type: String
    Description: Staging Create Object Lambda Function Name

  DocumentActionsProcessor:
    Type: String
    Description: Document Actions Processor Lambda Function Name

  DocumentsHttpApi:
    Type: String
    Description: Documents HTTP API Id

  DocumentsIamApi:
    Type: String
    Description: Documents IAM API Id

  UserAuthApiUrl:
    Type: String
    Description: User Auth API Url

  DocumentsDeadLetterQueueName:
    Type: String
    Description: Documents Dead Letter Queue Name
    
Resources:

  ApplicationDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: 
        Fn::Sub: "${AWS::StackName}-dashboard"
      DashboardBody: 
        Fn::Sub: '{"widgets":[{"height":6,"width":6,"y":6,"x":0,"type":"metric","properties":{"metrics":[["AWS/Lambda","Invocations","FunctionName","${DocumentsApiRequests}"],[".","Errors",".","."],[".","Throttles",".","."],[".","Duration",".",".",{"stat":"Average"}],[".","ConcurrentExecutions",".",".",{"stat":"Maximum"}]],"view":"timeSeries","region":"${AWS::Region}","stacked":false,"title":"Documents Api","period":60,"stat":"Sum"}},{"height":6,"width":6,"y":6,"x":12,"type":"metric","properties":{"metrics":[["AWS/Lambda","Invocations","FunctionName","${DocumentsUpdateObject}"],[".","Errors",".","."],[".","Throttles",".","."],[".","Duration",".",".",{"stat":"Average"}],[".","ConcurrentExecutions",".",".",{"stat":"Maximum"}]],"view":"timeSeries","region":"${AWS::Region}","stacked":false,"title":"Documents Content Update","period":60,"stat":"Sum"}},{"height":6,"width":6,"y":6,"x":18,"type":"metric","properties":{"metrics":[["AWS/Lambda","Invocations","FunctionName","${StagingCreateObject}"],[".","Errors",".","."],[".","Throttles",".","."],[".","Duration",".",".",{"stat":"Average"}],[".","ConcurrentExecutions",".",".",{"stat":"Maximum"}]],"view":"timeSeries","region":"${AWS::Region}","stacked":false,"title":"Add Documents","period":60,"stat":"Sum"}},{"height":6,"width":6,"y":6,"x":6,"type":"metric","properties":{"metrics":[["AWS/Lambda","Invocations","FunctionName","${DocumentActionsProcessor}"],[".","Errors",".","."],[".","Throttles",".","."],[".","Duration",".",".",{"stat":"Average"}],[".","ConcurrentExecutions",".",".",{"stat":"Maximum"}]],"view":"timeSeries","region":"${AWS::Region}","stacked":false,"title":"Document Actions","period":60,"stat":"Sum"}},{"height":6,"width":6,"y":12,"x":0,"type":"metric","properties":{"metrics":[["AWS/ApiGateway","4xx","ApiId","${DocumentsHttpApi}",{"yAxis":"right"}],[".","5xx",".",".",{"yAxis":"right"}],[".","DataProcessed",".",".",{"yAxis":"left"}],[".","Count",".",".",{"label":"Count","yAxis":"right"}],[".","IntegrationLatency",".",".",{"stat":"Average"}],[".","Latency",".",".",{"stat":"Average"}]],"view":"timeSeries","stacked":false,"region":"${AWS::Region}","period":60,"stat":"Sum","title":"Document Http API"}},{"height":6,"width":24,"y":0,"x":0,"type":"metric","properties":{"metrics":[["AWS/Lambda","Invocations","FunctionName","${StagingCreateObject}",{"label":"Processed Documents"}],["AWS/Lambda","Invocations","FunctionName","${DocumentsApiRequests}",{"label":"API Requests"}]],"view":"timeSeries","stacked":false,"title":"Document Metrics","region":"${AWS::Region}","period":60,"stat":"Sum"}},{"height":6,"width":6,"y":12,"x":6,"type":"metric","properties":{"metrics":[["AWS/ApiGateway","4xx","ApiId","${DocumentsIamApi}",{"yAxis":"right"}],[".","5xx",".",".",{"yAxis":"right"}],[".","DataProcessed",".",".",{"yAxis":"left"}],[".","Count",".",".",{"label":"Count","yAxis":"right"}],[".","IntegrationLatency",".",".",{"stat":"Average"}],[".","Latency",".",".",{"stat":"Average"}]],"view":"timeSeries","stacked":false,"region":"${AWS::Region}","period":60,"stat":"Sum","title":"Document IAM API"}},{"height":6,"width":6,"y":12,"x":12,"type":"metric","properties":{"metrics":[["AWS/ApiGateway","4xx","ApiId","${UserAuthApiUrl}",{"yAxis":"right"}],[".","5xx",".",".",{"yAxis":"right"}],[".","DataProcessed",".",".",{"yAxis":"left"}],[".","Count",".",".",{"label":"Count","yAxis":"right"}],[".","IntegrationLatency",".",".",{"stat":"Average"}],[".","Latency",".",".",{"stat":"Average"}]],"view":"timeSeries","stacked":false,"region":"${AWS::Region}","period":60,"stat":"Sum","title":"Cognito API"}}]}'

  DlqAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 
        Fn::Sub: "FormKiQ-DLQ-${AppEnvironment}"
      AlarmDescription: 
        Fn::Sub: "There are failed messages in the FormKiQ ${AppEnvironment} dead letter queue."
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: 
            Ref: DocumentsDeadLetterQueueName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - Ref: DlqAlarmEmail

  DlqAlarmEmail:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: 
        Fn::Sub: "FormKiQ-DLQ-${AppEnvironment}-Alert"
      TopicName:
        Fn::Sub: "FormKiQ-DLQ-${AppEnvironment}-Alert"
      Tags:
        - Key: "Application"
          Value: "FormKiQ"
        - Key: "AppEnvironment"
          Value:
            Fn::Sub: "${AppEnvironment}"
  
  DlqAlarmEmailParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: "DLQ Alarm Email Topic"
      Name: 
        Fn::Sub: "/formkiq/${AppEnvironment}/sns/DlqAlarm"
      Type: String
      Value: 
        Ref: DlqAlarmEmail
      Tags:
        AppEnvironment: 
          Fn::Sub: "${AppEnvironment}"

Outputs:

  DashboardURL:
    Description: "Dashboard URL"
    Value: 
      Fn::Sub: "https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${ApplicationDashboard}"
