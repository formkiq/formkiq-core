import org.apache.tools.ant.taskdefs.condition.Os

description = "FormKiQ Core - WebSocket"

apply plugin: 'distribution'

sourceSets {
  integration {
    java.srcDir "$projectDir/src/integration/java"
    resources.srcDir "$projectDir/src/integration/resources"
    compileClasspath += main.output + test.output
    runtimeClasspath += main.output + test.output
  }
}

configurations {
  integrationImplementation.extendsFrom testImplementation
  integrationRuntime.extendsFrom testRuntime
}

def getCmd() {
  String os = System.getProperty("os.name").toLowerCase()
  return os.contains("win") ? "cmd" : "bash"
}

def getCmdParam() {
  String os = System.getProperty("os.name").toLowerCase()
  return os.contains("win") ? "/c" : "-c"
}

jar.enabled = false

dependencies {
  testImplementation project(':adapters:aws:sqs')
  testImplementation project(':adapters:aws:ssm')
  testImplementation project(':adapters:aws:cognito-identity')
  testImplementation project(':adapters:aws:cognito-identityprovider')
  testImplementation project(':adapters:aws:dynamodb')
  testImplementation project(':domain:documents')
  testImplementation project(':testing:test-utils')

  testImplementation libs.aws.sdk.dynamodb

  testImplementation libs.junit.jupiter.engine
  testRuntimeOnly  libs.junit.platform.launcher
  
  testImplementation libs.gson
  testImplementation libs.java.websocket
  testImplementation libs.slf4j.simple
}

task integrationTest(type: Test) {
  testClassesDirs = sourceSets.integration.output.classesDirs
  classpath = sourceSets.integration.runtimeClasspath
}

task npmInstall {

  dependsOn processResources

  doLast {

    delete("${buildDir}/resources/main/js/websocket-api.zip")

    exec {
      workingDir "${buildDir}/resources/main/js"
      commandLine getCmd(), getCmdParam(), "npm install"
    }

    exec {
      workingDir "${buildDir}/resources/main/js"
      commandLine getCmd(), getCmdParam(), "npm run pack"
    }
  }
}

jar.dependsOn npmInstall

task npmtest {
  onlyIf { !Os.isFamily(Os.FAMILY_WINDOWS) }
  inputs.dir("src/main/resources/js")
  outputs.dir("${buildDir}/resources/main/js/coverage")
  doLast {
    exec {
      workingDir "${buildDir}/resources/main/js"
      commandLine getCmd(), getCmdParam(), "npm test"
    }
  }
}

npmtest.dependsOn compileIntegrationJava,checkstyleIntegration,spotbugsIntegration

