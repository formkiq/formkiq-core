
description = "DocumentStore Dynamodb"

sourceSets {
  integration {
    java.srcDir "$projectDir/src/integration/java"
    resources.srcDir "$projectDir/src/integration/resources"

    compileClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
    runtimeClasspath += output + compileClasspath
  }
}

configurations {
  integrationImplementation.extendsFrom testImplementation
  integrationRuntimeOnly.extendsFrom testRuntimeOnly
}

dependencies {

  annotationProcessor libs.formkiq.graalvm.annotations.processor

  implementation project(':libs:strings')
  implementation project(':adapters:aws:s3')
  implementation project(':adapters:aws:dynamodb')
  implementation project(':domain:plugins')
  implementation project(':libs:validation')
  implementation project(':libs:lambda-services')
  implementation libs.formkiq.graalvm.annotations
  implementation libs.gson

  testImplementation project(':adapters:aws:ssm')
  testImplementation project(':testing:test-utils')
  testImplementation libs.slf4j.api
  testImplementation libs.guava
  testImplementation libs.slf4j.simple

  testImplementation platform(libs.junit.bom)
  testImplementation libs.junit.jupiter
  testRuntimeOnly  libs.junit.platform.launcher

  testImplementation platform(libs.testcontainers.bom)
  testImplementation libs.testcontainers
  testImplementation libs.testcontainers.testcontainers.junit.jupiter

  configurations.all {
    exclude group: 'software.amazon.awssdk', module: 'apache-client'
    exclude group: 'software.amazon.awssdk', module: 'netty-nio-client'
  }
}

jar {
  archiveBaseName = 'dynamodb-documents'
}

task createZip(type: Zip) {
  from "nodejs"
  include "*"
  include "*/*"
  archiveFileName = "documentsmetrics-${project.version}.zip"
  destinationDirectory = file("$buildDir/distributions")
}

createZip.dependsOn check
build.dependsOn createZip

tasks.register("integrationTest", Test) {
  testClassesDirs = sourceSets.integration.output.classesDirs
  classpath = sourceSets.integration.runtimeClasspath
}
