plugins {
  id 'distribution'
}

description = "FormKiQ AWS Cloud Packaging"

def awsCloudPackageTasks = [
  ':apps:console:distZip',
  ':apps:lambda-api:distZip',
  ':apps:lambda-s3:distZip',
  ':apps:lambda-typesense:distZip',
  ':apps:lambda-ocr-tesseract:distZip',
  ':apps:lambda-apikey-authorizer:distZip'
]

tasks.named('distZip') {
  description = 'Builds the AWS Cloud distribution package.'
  archiveBaseName.set(rootProject.name)
  destinationDirectory.set(rootProject.layout.buildDirectory.dir("distributions"))
  dependsOn awsCloudPackageTasks, ':packaging:cloudformation:yttRenderAll'
}

tasks.register('assembleAwsCloud') {
  group = 'build'
  description = 'Assembles the AWS Cloud distribution package.'
  dependsOn tasks.named('distZip')
}

tasks.distTar.enabled = false

distributions {
  main {
    contents {
      duplicatesStrategy = DuplicatesStrategy.FAIL

      from(rootProject.file(".")) {
        include "INSTALL.md"
        include "LICENSE"
      }
      from(rootProject.file("src/main/resources/cloudformation")) {
        exclude "api/**"
        exclude "typesense/**"
        exclude "storage/**"
        exclude "console/template.yaml"
        exclude "template.yaml"
      }
      from project(':packaging:cloudformation').layout.buildDirectory.dir('ytt')
      from rootProject.file('apps/console/build/distributions')
      from rootProject.file('build/modules')
      from rootProject.file('apps/lambda-api/build/distributions')
      from rootProject.file('apps/lambda-s3/build/distributions')
      from rootProject.file('apps/lambda-typesense/build/distributions')
      from rootProject.file('apps/lambda-ocr-tesseract/build/distributions')
      from rootProject.file('apps/lambda-apikey-authorizer/build/distributions')
      into '/'
    }
  }
}
