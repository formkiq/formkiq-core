//distZip.dependsOn graalvmNativeImage

tasks.distTar.enabled = false

distZip {
  archiveFileName = "api/${moduleName}.zip"
}

distributions {
  main {
    contents {
      from("runtime/") {
        include "bootstrap"
      }
      from ("${buildDir}/graalvm/output") {
        include("server")
      }
      into '/'
    }
  }
}
