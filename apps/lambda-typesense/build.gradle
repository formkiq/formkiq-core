tasks.distTar.enabled = false

distZip {
  archiveFileName = "typesense/${moduleName}-graalvm.zip"
}

distributions {
  main {
    contents {
      from("runtime/") {
        include "bootstrap"
        filePermissions {
          unix('0755')
        }
      }
      from("${buildDir}/graalvm/output") {
        include("server")
        filePermissions {
          unix('0755')
        }
      }
      into '/'
    }
  }
}
